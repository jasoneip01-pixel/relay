name: News Relay

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests lxml
      - name: Run collector
        run: python3 .github/workflows/news_relay.py
      - name: Commit & push
        run: |
          git config user.name "news-relay[bot]"
          git config user.email "bot@relay.local"
          git add data/news/
          git diff --staged --quiet || (git commit -m "news: $(date -u +%Y-%m-%dT%H:%M)" && git push)
